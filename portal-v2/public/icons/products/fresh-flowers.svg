  <ellipse cx="28" cy="16" rx="3" ry="2.5" fill="#FFC107"/>
  <ellipse cx="26" cy="10" rx="4" ry="2.5" fill="#FFC107"/>
  <circle cx="32" cy="12" r="3.5" fill="#8D6E63"/>
  <!-- Pink carnation - left -->
  <circle cx="18" cy="16" r="4" fill="#EC407A"/>
  <circle cx="15" cy="13" r="3.5" fill="#F06292"/>
  <circle cx="20" cy="11" r="3.5" fill="#E91E63"/>
  <circle cx="16" cy="18" r="3" fill="#F48FB1"/>
  <!-- Orange flower - right -->
  <circle cx="46" cy="16" r="4" fill="#FF9800"/>
