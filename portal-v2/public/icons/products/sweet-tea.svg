<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#5C2D0E"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="62" rx="11" ry="2" fill="#00000010"/>
  <!-- Bottle body -->
  <rect x="20" y="14" width="24" height="46" rx="3" fill="#C8BCA8" opacity="0.35" stroke="#B0A490" stroke-width="0.4"/>
  <!-- Tea liquid -->
  <rect x="20" y="20" width="24" height="40" rx="3" fill="url(#tea)" opacity="0.85"/>
  <!-- Bottle neck -->
  <rect x="24" y="8" width="16" height="8" rx="2" fill="#C8BCA8" opacity="0.35" stroke="#B0A490" stroke-width="0.3"/>
  <!-- Red cap -->
  <rect x="22" y="4" width="20" height="6" rx="3" fill="#D03030"/>
  <rect x="23" y="3" width="18" height="3" rx="2" fill="#E04040"/>
  <!-- Cap ridges -->
  <line x1="26" y1="7" x2="26" y2="9" stroke="#B02828" stroke-width="0.5"/>
  <line x1="30" y1="7" x2="30" y2="9" stroke="#B02828" stroke-width="0.5"/>
  <line x1="34" y1="7" x2="34" y2="9" stroke="#B02828" stroke-width="0.5"/>
  <line x1="38" y1="7" x2="38" y2="9" stroke="#B02828" stroke-width="0.5"/>
  <!-- Black label -->
  <rect x="20" y="28" width="24" height="18" rx="1" fill="#282828"/>
  <!-- Red band -->
  <rect x="20" y="34" width="24" height="5" fill="#B02020"/>
  <!-- Label text -->
  <circle cx="24" cy="31" r="2" fill="#4CAF50"/>
  <rect x="28" y="30" width="10" height="1.5" rx="0.5" fill="#FFF" opacity="0.8"/>
  <rect x="24" y="36" width="16" height="1.5" rx="0.5" fill="#FFF" opacity="0.7"/>
  <rect x="24" y="42" width="12" height="1" rx="0.5" fill="#AAA" opacity="0.5"/>
  <!-- Bottle shine -->
  <path d="M22 20 L22 54" stroke="#FFF" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
</svg>