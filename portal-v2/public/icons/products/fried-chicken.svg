<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCA040"/>
      <stop offset="100%" stop-color="#B87820"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="56" rx="26" ry="2.5" fill="#00000010"/>
  <!-- Bottom: green rectangle -->
  <rect x="2" y="32" width="60" height="22" rx="1" fill="#1B6B3A"/>
  <!-- Top: green trapezoid -->
  <polygon points="12,14 52,14 62,32 2,32" fill="#1E7840"/>
  <line x1="2" y1="32" x2="62" y2="32" stroke="#145830" stroke-width="0.5" opacity="0.5"/>
  <!-- Handle -->
  <rect x="25" y="16" width="14" height="5" rx="1.5" fill="#F0EDE5"/>
  <!-- "Hot. Crispy. Ready." left side, lower portion -->
  <text x="5" y="40" font-family="Arial,sans-serif" font-size="4" font-weight="bold" fill="#FFFFFF" opacity="0.9">Hot.</text>
  <text x="5" y="45" font-family="Arial,sans-serif" font-size="4" font-weight="bold" fill="#FFFFFF" opacity="0.9">Crispy.</text>
  <text x="5" y="50" font-family="Arial,sans-serif" font-size="4" font-weight="bold" fill="#FFFFFF" opacity="0.9">Ready.</text>
  <!-- Window: wider, less tall, upper portion of box -->
  <rect x="12" y="26" width="38" height="16" rx="2" fill="#F0E0C0"/>
  <!-- Chicken pieces -->
  <ellipse cx="22" cy="34" rx="7" ry="5" fill="url(#fc)"/>
  <ellipse cx="35" cy="32" rx="7.5" ry="5" fill="#D49030"/>
  <ellipse cx="44" cy="36" rx="5" ry="3.5" fill="url(#fc)"/>
  <ellipse cx="28" cy="38" rx="5" ry="3" fill="#D49030"/>
  <circle cx="20" cy="32" r="2" fill="#C48828" opacity="0.2"/>
  <circle cx="33" cy="30" r="2.5" fill="#C48828" opacity="0.2"/>
  <!-- White label: shorter, anchored bottom right -->
  <rect x="44" y="40" width="14" height="12" rx="1" fill="#FFFFFF" opacity="0.9"/>
  <rect x="46" y="42" width="10" height="1.5" rx="0.5" fill="#43A047" opacity="0.7"/>
  <rect x="46" y="44.5" width="7" height="1" rx="0.5" fill="#333" opacity="0.3"/>
  <!-- Publix P -->
  <circle cx="51" cy="49" r="2.5" fill="#1B6B3A"/>
  <text x="49.2" y="51.2" font-family="Georgia,serif" font-size="4.2" font-weight="bold" fill="#FFF">p</text>
</svg>