<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bowl of ice cream with sprinkles -->
  <defs>
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <radialGradient id="van" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#FFFDE8"/>
      <stop offset="100%" stop-color="#FFE9A0"/>
    </radialGradient>
  </defs>
  <ellipse cx="32" cy="58" rx="20" ry="3" fill="#00000010"/>
  <!-- Bowl -->
  <path d="M4 30 Q2 54 32 56 Q62 54 60 30 Z" fill="url(#bowl)" stroke="#BDBDBD" stroke-width="0.5"/>
  <ellipse cx="32" cy="30" rx="28" ry="7" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Scoop 1 - vanilla, left -->
  <circle cx="20" cy="22" r="12" fill="url(#van)"/>
  <path d="M12 18 Q18 14 24 18" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Scoop 2 - vanilla, right -->
  <circle cx="44" cy="22" r="12" fill="#FFF3D4"/>
  <path d="M38 18 Q42 14 48 18" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <!-- Scoop 3 - on top, center -->
  <circle cx="32" cy="12" r="11" fill="#FFFDE8"/>
  <path d="M26 8 Q32 4 38 8" fill="none" stroke="#FFF" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Rainbow sprinkles on top scoop -->
  <rect x="26" y="8" width="3" height="1.2" rx="0.6" fill="#E53935" transform="rotate(30 27 8)"/>
  <rect x="32" y="6" width="3" height="1.2" rx="0.6" fill="#1E88E5" transform="rotate(-20 33 6)"/>
  <rect x="36" y="10" width="3" height="1.2" rx="0.6" fill="#43A047" transform="rotate(50 37 10)"/>
  <rect x="28" y="12" width="3" height="1.2" rx="0.6" fill="#FDD835" transform="rotate(-40 29 12)"/>
  <rect x="34" y="14" width="3" height="1.2" rx="0.6" fill="#FB8C00" transform="rotate(15 35 14)"/>
  <rect x="30" y="16" width="3" height="1.2" rx="0.6" fill="#7B1FA2" transform="rotate(-25 31 16)"/>
  <rect x="38" y="8" width="2.5" height="1.2" rx="0.6" fill="#F48FB1" transform="rotate(40 39 8)"/>
  <rect x="24" y="14" width="2.5" height="1.2" rx="0.6" fill="#E53935" transform="rotate(-10 25 14)"/>
  <!-- Sprinkles on side scoops -->
  <rect x="16" y="18" width="2.5" height="1.1" rx="0.5" fill="#1E88E5" transform="rotate(35 17 18)"/>
  <rect x="22" y="20" width="2.5" height="1.1" rx="0.5" fill="#FDD835" transform="rotate(-30 23 20)"/>
  <rect x="42" y="18" width="2.5" height="1.1" rx="0.5" fill="#43A047" transform="rotate(-15 43 18)"/>
  <rect x="48" y="20" width="2.5" height="1.1" rx="0.5" fill="#FB8C00" transform="rotate(25 49 20)"/>
</svg>