<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Reference: berries arranged across the top surface, not just center.
       2-3 strawberries spaced out with blueberry clusters between them. -->
  <defs>
    <linearGradient id="fr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF5"/>
      <stop offset="100%" stop-color="#F5F0E0"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="56" rx="22" ry="3.5" fill="#00000015"/>
  <!-- Gold base -->
  <ellipse cx="32" cy="52" rx="24" ry="5" fill="#C8A860"/>
  <ellipse cx="32" cy="51" rx="24" ry="5" fill="#D4B878"/>
  <!-- Cake body -->
  <rect x="10" y="20" width="44" height="32" rx="2" fill="url(#fr)"/>
  <!-- Frosting ridges -->
  <line x1="10" y1="23" x2="54" y2="23" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="26" x2="54" y2="26" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="29" x2="54" y2="29" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="35" x2="54" y2="35" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="38" x2="54" y2="38" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="41" x2="54" y2="41" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="44" x2="54" y2="44" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="47" x2="54" y2="47" stroke="#EDE8E0" stroke-width="0.7"/>
  <line x1="10" y1="50" x2="54" y2="50" stroke="#EDE8E0" stroke-width="0.7"/>
  <!-- Top surface -->
  <ellipse cx="32" cy="20" rx="22" ry="5" fill="#FAF6F0"/>
  <!-- Berries spread across the top, not bunched -->
  <!-- Strawberry - left side -->
  <ellipse cx="18" cy="18" rx="4" ry="3.5" fill="#EF5350" transform="rotate(-10 18 18)"/>
  <path d="M16 15 L18 13 L20 15" fill="#43A047"/>
  <circle cx="17" cy="17" r="0.4" fill="#C62828"/>
  <circle cx="19" cy="19" r="0.4" fill="#C62828"/>
  <!-- Blueberries - left-center cluster -->
  <circle cx="26" cy="18" r="2.2" fill="#3949AB"/>
  <circle cx="24" cy="20" r="2" fill="#3949AB"/>
  <circle cx="23" cy="17" r="1.8" fill="#3949AB"/>
  <!-- Strawberry - right-center -->
  <ellipse cx="36" cy="17" rx="4.5" ry="3.5" fill="#EF5350" transform="rotate(8 36 17)"/>
  <path d="M34 14 L36 12 L38 14" fill="#43A047"/>
  <circle cx="35" cy="16" r="0.4" fill="#C62828"/>
  <circle cx="37" cy="18" r="0.4" fill="#C62828"/>
  <!-- Blueberries - right cluster -->
  <circle cx="44" cy="18" r="2.2" fill="#3949AB"/>
  <circle cx="46" cy="20" r="2" fill="#3949AB"/>
  <circle cx="42" cy="20" r="1.8" fill="#3949AB"/>
  <!-- A few blueberry highlights -->
  <circle cx="26" cy="17" r="0.8" fill="#5C6BC0" opacity="0.4"/>
  <circle cx="44" cy="17" r="0.8" fill="#5C6BC0" opacity="0.4"/>
</svg>