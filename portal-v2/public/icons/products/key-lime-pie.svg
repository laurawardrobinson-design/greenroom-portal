<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Reference: Top-down view. Round pie. Graham cracker crust edge visible.
       Pale yellow-green smooth filling. Ring of piped whipped cream rosettes
       around the edge. Single lime slice dead center. -->
  <defs>
    <radialGradient id="klf" cx="0.5" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#F0F4C8"/>
      <stop offset="100%" stop-color="#E4E8B0"/>
    </radialGradient>
  </defs>
  <!-- Shadow -->
  <ellipse cx="32" cy="56" rx="26" ry="4" fill="#00000010"/>
  <!-- Graham cracker crust - outer ring -->
  <circle cx="32" cy="32" r="30" fill="#C89040"/>
  <circle cx="32" cy="32" r="28" fill="#D4A050"/>
  <!-- Pale yellow-green filling -->
  <circle cx="32" cy="32" r="26" fill="url(#klf)"/>
  <!-- Piped whipped cream rosettes - ring of ~14 dollops -->
  <circle cx="32" cy="7" r="3.5" fill="#FEFDF8"/>
  <circle cx="42" cy="9" r="3.5" fill="#FEFDF8"/>
  <circle cx="50" cy="14" r="3.5" fill="#FEFDF8"/>
  <circle cx="55" cy="22" r="3.5" fill="#FEFDF8"/>
  <circle cx="56" cy="32" r="3.5" fill="#FEFDF8"/>
  <circle cx="55" cy="42" r="3.5" fill="#FEFDF8"/>
  <circle cx="50" cy="50" r="3.5" fill="#FEFDF8"/>
  <circle cx="42" cy="55" r="3.5" fill="#FEFDF8"/>
  <circle cx="32" cy="57" r="3.5" fill="#FEFDF8"/>
  <circle cx="22" cy="55" r="3.5" fill="#FEFDF8"/>
  <circle cx="14" cy="50" r="3.5" fill="#FEFDF8"/>
  <circle cx="9" cy="42" r="3.5" fill="#FEFDF8"/>
  <circle cx="8" cy="32" r="3.5" fill="#FEFDF8"/>
  <circle cx="9" cy="22" r="3.5" fill="#FEFDF8"/>
  <circle cx="14" cy="14" r="3.5" fill="#FEFDF8"/>
  <circle cx="22" cy="9" r="3.5" fill="#FEFDF8"/>
  <!-- Center lime slice -->
  <circle cx="32" cy="32" r="6" fill="#689F38"/>
  <circle cx="32" cy="32" r="5" fill="#8BC34A"/>
  <!-- Lime segments -->
  <line x1="32" y1="27" x2="32" y2="37" stroke="#689F38" stroke-width="0.6"/>
  <line x1="27" y1="32" x2="37" y2="32" stroke="#689F38" stroke-width="0.6"/>
  <line x1="29" y1="29" x2="35" y2="35" stroke="#689F38" stroke-width="0.6"/>
  <line x1="29" y1="35" x2="35" y2="29" stroke="#689F38" stroke-width="0.6"/>
  <circle cx="32" cy="32" r="1.5" fill="#AED581"/>
</svg>