  <line x1="26" y1="32" x2="34" y2="42" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="30" y1="30" x2="38" y2="40" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="28" x2="42" y2="38" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Small green squares - left of chicken -->
  <rect x="12" y="34" width="4" height="4" rx="0.8" fill="#43A047"/>
  <rect x="12" y="40" width="4" height="4" rx="0.8" fill="#388E3C"/>
  <rect x="17" y="37" width="3.5" height="3.5" rx="0.8" fill="#66BB6A"/>
