  <!-- Small purple onion arc -->
  <path d="M28 28 A3 3 0 0 1 34 28" fill="none" stroke="#7B1FA2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Grilled chicken/protein - center, more angular/hexagonal -->
